name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck frontend
        run: npm run typecheck
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Compile backend
        run: python -m compileall backend

  integration:
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Prepare environment file
        run: |
          cat > .env <<'EOF'
          OPENAI_API_KEY=dummy-ci-key
          EOF

      - name: Build and start containers via make
        run: make

      - name: Wait for app availability
        run: |
          for i in {1..45}; do
            if curl -fsS http://localhost:3000/ >/dev/null; then
              echo "App is reachable"
              exit 0
            fi
            echo "Waiting for app... ($i/45)"
            sleep 2
          done
          echo "App did not become reachable in time"
          exit 1

      - name: Test app and auth endpoints
        run: |
          set -euo pipefail

          echo "Checking /"
          curl -fsS http://localhost:3000/ >/dev/null

          echo "Checking /health"
          curl -fsS http://localhost:3000/health | grep -q '"status"'

          echo "Checking /auth/register"
          AUTH_RESPONSE="$(curl -fsS -X POST http://localhost:3000/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"email":"ci@example.com","password":"secret123"}')"
          echo "$AUTH_RESPONSE" | grep -q '"email"'

          echo "Checking /chat"
          CHAT_RESPONSE="$(curl -fsS -X POST http://localhost:3000/chat \
            -H 'Content-Type: application/json' \
            -d '{"message":"CI check","history":[],"customer_email":"ci@example.com"}')"
          echo "$CHAT_RESPONSE" | grep -q '"response"'

      - name: Check all containers are running
        run: |
          set -euo pipefail

          expected_services="$(docker compose -f docker-compose.yml config --services)"
          running_services="$(docker compose -f docker-compose.yml ps --status running --services)"

          echo "Expected services:"
          echo "$expected_services"
          echo "Running services:"
          echo "$running_services"

          while read -r service; do
            [ -z "$service" ] && continue
            if ! echo "$running_services" | grep -qx "$service"; then
              echo "Service not running: $service"
              docker compose -f docker-compose.yml ps
              exit 1
            fi
          done <<< "$expected_services"

      - name: Dump container status and logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs --no-color --tail=200

      - name: Shutdown containers
        if: always()
        run: docker compose -f docker-compose.yml down -v
